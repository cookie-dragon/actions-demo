  job_test:
    name: JOB TEST
    runs-on: ubuntu-18.04
    outputs:
      S_FILENAME: ${{steps.step2.outputs.S_FILENAME}}
      U_FILENAME: ${{steps.step2.outputs.U_FILENAME}}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Prepare
        run: |
          mkdir -p output
          touch output/MLO
          touch output/u-boot.img
          touch output/uImage
          touch output/ubi.img

      - id: step1
        name: Check Versions
        run: |
          KERNEL_VERSION=`cat hilectroElec/version.json | jq -r '.kernel_version'`
          FILE_SYS_VERSION=`cat hilectroElec/version.json | jq -r '.FILE_SYS_VERSION'`
          DATE_VERSION=`cat hilectroElec/version.json | jq -r '.date_version'`
          echo "::set-output name=KERNEL_VERSION::${KERNEL_VERSION}"
          echo "::set-output name=FILE_SYS_VERSION::${FILE_SYS_VERSION}"
          echo "::set-output name=DATE_VERSION::${DATE_VERSION}"

      - id: step2
        name: Check Output File Name
        run: |
          S_FILENAME=T2-Kernel-V${{steps.step2.outputs.KERNEL_VERSION}}-Filesys-V${{steps.step2.outputs.FILE_SYS_VERSION}}-S-${{steps.step2.outputs.DATE_VERSION}}
          U_FILENAME=T2-Kernel-V${{steps.step2.outputs.KERNEL_VERSION}}-Filesys-V${{steps.step2.outputs.FILE_SYS_VERSION}}-U-${{steps.step2.outputs.DATE_VERSION}}
          echo "::set-output name=S_FILENAME::${S_FILENAME}"
          echo "::set-output name=U_FILENAME::${U_FILENAME}"

  job_test2:
    name: JOB TEST 2
    runs-on: ubuntu-18.04
    needs: [job_test]
    steps:
      - name: STEP - TEST
        run: |
          echo ${{needs.job_test.outputs.S_FILENAME}} ${{needs.job_test.outputs.U_FILENAME}}
