name: common CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cross_compile:
        description: 'PREFIX'
        required: true
        default: 'arm-linux-gnueabihf'
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: true
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false

jobs:
  job_test1:
    name: Job - Test 1
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Prepare Dir and File
        run: |
          mkdir -p upload_artifact/publish
          touch upload_artifact/publish/testfile.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: publish
          path: ./upload_artifact

  job_test2:
    name: Job - Test 2
    needs: [job_test1]
    runs-on: ubuntu-18.04
    steps:

      - name: Prepare Dir
        run: |
          mkdir -p download_artifact

      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: publish
          path: ./download_artifact/

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          zip -qr publish.zip publish

          echo "FIRMWARE=$PWD/download_artifact/publish.zip" >> $GITHUB_ENV

          RTN_gettoken=`curl --location --request GET "https://qyapi.weixin.qq.com/cgi-bin/gettoken?corpid=${{ secrets.WECHATWORK_CORPID }}&corpsecret=${{ secrets.WECHATWORK_APP_CORPSECRET }}"`
          access_token=`echo ${RTN_gettoken} | jq -r '.access_token'`
          echo "ACCESS_TOKEN=${access_token}" >> $GITHUB_ENV

          echo "::set-output name=status::success"
        working-directory: ./download_artifact

      - name: Upload firmware to Cowtransfer
        id: cowtransfer
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_COWTRANSFER == 'true' && !cancelled()
        run: |
          curl -fsSL git.io/file-transfer | sh
          ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
          echo "::warning file=cowtransfer.com::$(cat cowtransfer.log | grep https)"
          echo "::set-output name=url::$(cat cowtransfer.log | grep https | cut -f3 -d" ")"

          L2=`sed -n '2p' cowtransfer.log`
          L3=`sed -n '3p' cowtransfer.log`
          DownloadLink=${L2#*: }
          DownloadCode=${L3#*: }

          curl --location --request POST "https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=${ACCESS_TOKEN}" \
          --header 'Content-Type: application/json' \
          --data-raw '{
            "touser" : "@all",
            "msgtype" : "textcard",
            "agentid" : '"${{ secrets.WECHATWORK_APP_AGENTID }}"',
            "textcard" : {
              "title" : "Github Action ńö¤µłÉÕø║õ╗Č",
              "description" : "<div class=\"gray\">'"$(date "+%YÕ╣┤%mµ£ł%dµŚź %H:%M:%S")"'</div><div class=\"normal\">Õø║õ╗ČÕĘ▓õĖŖõ╝ĀCowTransfer’╝īÕÅ¢õ╗ČńĀü’╝Ü'"${DownloadCode}"'</div><div class=\"highlight\">Ķ»Ęõ║Ä24Õ░ÅµŚČÕåģõĖŗĶĮĮ</div>",
              "url" : "'"${DownloadLink}"'"
            }
          }'

      - name: Upload firmware to WeTransfer
        id: wetransfer
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_WETRANSFER == 'true' && !cancelled()
        run: |
          curl -fsSL git.io/file-transfer | sh
          ./transfer wet -s -p 16 --no-progress ${FIRMWARE} 2>&1 | tee wetransfer.log
          echo "::warning file=wetransfer.com::$(cat wetransfer.log | grep https)"
          echo "::set-output name=url::$(cat wetransfer.log | grep https | cut -f3 -d" ")"

          L3=`sed -n '3p' wetransfer.log`
          DownloadLink=${L3#*: }

          curl --location --request POST "https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=${ACCESS_TOKEN}" \
          --header 'Content-Type: application/json' \
          --data-raw '{
            "touser" : "@all",
            "msgtype" : "textcard",
            "agentid" : '"${{ secrets.WECHATWORK_APP_AGENTID }}"',
            "textcard" : {
              "title" : "Github Action ńö¤µłÉÕø║õ╗Č",
              "description" : "<div class=\"gray\">'"$(date "+%YÕ╣┤%mµ£ł%dµŚź %H:%M:%S")"'</div><div class=\"normal\">Õø║õ╗ČÕĘ▓õĖŖõ╝ĀWeTransfer</div><div class=\"highlight\">Ķ»Ęõ║Ä7µŚźÕåģõĖŗĶĮĮ</div>",
              "url" : "'"${DownloadLink}"'"
            }
          }'

      - name: Create Release
        id: create_release
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'  && !cancelled()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: tmp_tag
          release_name: Release tmp_tag
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'  && !cancelled()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./download_artifact/publish.zip
          asset_name: publish.zip
          asset_content_type: application/zip

      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
