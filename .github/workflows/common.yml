  #     - name: Upload Artifact Toolchain
  #       uses: actions/upload-artifact@v2
  #       with:
  #         name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
  #         path: ./gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

  job_env:
    name: JOB Env
    runs-on: ubuntu-18.04
    outputs:
      S_FILENAME: ${{steps.step2.outputs.S_FILENAME}}
      U_FILENAME: ${{steps.step2.outputs.U_FILENAME}}
      K_FILENAME: ${{steps.step2.outputs.K_FILENAME}}
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - id: step1
        name: Check Versions
        run: |
          KERNEL_VERSION=`cat hilectroElec/version.json | jq -r '.kernel_version'`
          FILE_SYS_VERSION=`cat hilectroElec/version.json | jq -r '.FILE_SYS_VERSION'`
          DATE_VERSION=`cat hilectroElec/version.json | jq -r '.date_version'`
          SCREEN_RESOLUTION=`cat hilectroElec/version.json | jq -r '.screen_resolution'`
          echo "::set-output name=KERNEL_VERSION::${KERNEL_VERSION}"
          echo "::set-output name=FILE_SYS_VERSION::${FILE_SYS_VERSION}"
          echo "::set-output name=DATE_VERSION::${DATE_VERSION}"
          echo "::set-output name=SCREEN_RESOLUTION::${SCREEN_RESOLUTION}"

      - id: step2
        name: Check Output File Name
        run: |
          S_FILENAME=T2-Kernel-V${{steps.step1.outputs.KERNEL_VERSION}}-Filesys-V${{steps.step1.outputs.FILE_SYS_VERSION}}-S-${{steps.step1.outputs.DATE_VERSION}}
          U_FILENAME=T2-Kernel-V${{steps.step1.outputs.KERNEL_VERSION}}-Filesys-V${{steps.step1.outputs.FILE_SYS_VERSION}}-U-${{steps.step1.outputs.DATE_VERSION}}
          K_FILENAME=kernel_${{steps.step1.outputs.SCREEN_RESOLUTION}}_${{steps.step1.outputs.DATE_VERSION}}
          echo "::set-output name=S_FILENAME::${S_FILENAME}"
          echo "::set-output name=U_FILENAME::${U_FILENAME}"
          echo "::set-output name=U_FILENAME::${K_FILENAME}"

  job_file:
    name: JOB File
    runs-on: ubuntu-18.04
    needs: [job_env]
    steps:

      - name: Prepare Dir
        run: |
          mkdir -p ${{needs.job_env.outputs.S_FILENAME}}
          sudo mkdir -p /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}

      - name: Prepare File
        run: |
          touch ${{needs.job_env.outputs.S_FILENAME}}/MLO
          touch ${{needs.job_env.outputs.S_FILENAME}}/u-boot.img
          touch ${{needs.job_env.outputs.S_FILENAME}}/uImage
          touch ${{needs.job_env.outputs.S_FILENAME}}/ubi.img
          sudo cp -f ${{needs.job_env.outputs.S_FILENAME}}/MLO /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}
          sudo cp -f ${{needs.job_env.outputs.S_FILENAME}}/u-boot.img /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}
          sudo cp -f ${{needs.job_env.outputs.S_FILENAME}}/uImage /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}

      - name: Check MD5
        run: |
          sudo md5sum /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}/MLO
          sudo md5sum /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}/u-boot.img
          sudo md5sum /home/haitian/onekey_update/${{needs.job_env.outputs.K_FILENAME}}/uImage

      - name: STEP - TEST
        run: echo ${{needs.job_env.outputs.S_FILENAME}} ${{needs.job_env.outputs.U_FILENAME}} ${{needs.job_env.outputs.K_FILENAME}}
