  job_test:
    name: JOB TEST
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: STEP - TEST
        run: |
          kernel_version=`cat hilectroElec/version.json | jq '.kernel_version'`
          FILE_SYS_VERSION=`cat hilectroElec/version.json | jq '.FILE_SYS_VERSION'`
          date_version=`cat hilectroElec/version.json | jq '.date_version'`
          S_FILENAME=T2-Kernel-V${kernel_version}-Filesys-V${FILE_SYS_VERSION}-S-${date_version}
          U_FILENAME=T2-Kernel-V${kernel_version}-Filesys-V${FILE_SYS_VERSION}-U-${date_version}
          echo ${S_FILENAME} ${U_FILENAME}
          