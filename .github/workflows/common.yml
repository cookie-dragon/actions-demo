name: common CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cross_compile:
        description: 'PREFIX'
        required: true
        default: 'arm-linux-gnueabihf'
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

jobs:
  job_test1:
    name: Job - Test 1
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Prepare Dir and File
        run: |
          mkdir -p upload_artifact/publish
          touch upload_artifact/publish/testfile.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: publish
          path: ./upload_artifact

  job_test2:
    name: Job - Test 2
    needs: [job_test1]
    runs-on: ubuntu-18.04
    steps:

      - name: Prepare Dir
        run: |
          mkdir -p download_artifact

      - name: Download Artifact
        uses: actions/download-artifact@v2
        with:
          name: publish
          path: ./download_artifact/

      - name: Zip
        run: zip -qr publish.zip publish
        working-directory: ./download_artifact

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Upload to CowTransfer
        run: |
          PWD=`pwd`
          FIRMWARE=${PWD}/download_artifact/publish.zip
          curl -fsSL git.io/file-transfer | sh
          ./transfer cow --block 2621440 -s -p 64 --no-progress ${FIRMWARE} 2>&1 | tee cowtransfer.log
          L2=`sed -n '2p' cowtransfer.log`
          L3=`sed -n '3p' cowtransfer.log`
          DownloadLink=${L2#*: }
          DownloadCode=${L3#*: }
          echo ${DownloadLink} ${DownloadCode}

      - name: Notification to WechatWork
        run: |
          RTN_gettoken=`curl --location --request GET "https://qyapi.weixin.qq.com/cgi-bin/gettoken?corpid=${{ secrets.WECHATWORK_CORPID }}&corpsecret=${{ secrets.WECHATWORK_APP_CORPSECRET }}"`
          access_token=`echo ${RTN_gettoken} | jq -r '.access_token'`
          curl --location --request POST 'https://qyapi.weixin.qq.com/cgi-bin/message/send?access_token=RsIFFLxPlhz5nwsH0eZvZJJGvJq-HZ2O41-jS1gc9M6kAYRAPCYXhZnP8M5O4YHcLvUfhFtEq4IpXg3Pt4RQVq0lzlaGUO1xt712hiagesWyJmBeLink5rj4bIgIwnCt8AjKeZGLqE6LqAcMXyIP6IhgeWqvgWutg6VEIFq8b6ucuMG6DPC2enyXwhGYKDSP34efpdkJ6C9twjllMhaHOA' \
          --header 'Content-Type: application/json' \
          --data-raw '{
             "touser" : "@all",
             "msgtype" : "text",
             "agentid" : '"${{ secrets.WECHATWORK_APP_AGENTID }}"',
             "text" : {
                 "content" : "你的快递已到，请携带工卡前往邮件中心领取。\n出发前可查看<a href=\"http://work.weixin.qq.com\">邮件中心视频实况</a>，聪明避开排队。"
             }
          }'
      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 1
          keep_minimum_runs: 3

