name: C/C++ CI

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  job_build:
    name: Job Build
    runs-on: ubuntu-18.04
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    
    - name: Pull Kernel
      run: git clone https://github.com/cookie-dragon/forlinx-335xS-II-kernel.git kernel
      
    - name: Get Buildroot
      run: |
        wget https://buildroot.org/downloads/buildroot-2016.02.tar.gz
        tar zxvf buildroot-2016.02.tar.gz
        cp config.2016.02 buildroot-2016.02/.config
        
    - name: Build Toolchain
      run: |
        cd buildroot-2016.02
        make -j$(nproc)
      
    - name: Show
      run: |
        pwd
        ls -l
