name: test CI

on:
  push:
    paths: 
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:

  job_test:
    name: Job - Test
    runs-on: ubuntu-18.04
    steps:
      # - name: Checkout
      #   uses: actions/checkout@v2

      - name: Step - Test
        run: |
          touch a.txt
          touch b.txt
          touch c.txt

          mkdir -p rfs_runner/t
          cp a.txt rfs_runner/t/
          sudo cp b.txt rfs_runner/t/
          sudo -u root cp c.txt rfs_runner/t/

          sudo mkdir -p rfs_sudo/t
          # cp a.txt rfs_sudo/t/
          sudo cp b.txt rfs_sudo/t/
          sudo -u root cp c.txt rfs_sudo/t/

          sudo -u root mkdir -p rfs_root/t
          cp a.txt rfs_root/t/
          sudo cp b.txt rfs_root/t/
          sudo -u root cp c.txt rfs_root/t/

          tree -pug

