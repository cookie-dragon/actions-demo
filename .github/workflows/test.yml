name: test CI

on:
  push:
    paths: 
      # - 'common/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  job_test:
    name: Job - Test
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Step - Test
        run: |
          python --version
          python3 --version
          pip --version
          pip3 --version
          pip3 install setuptools_rust
          cp -rf htbox-forlinx/buildroot-add/support/scripts/scanpypi3 ./
          chmod +x scanpypi3
          python3 scanpypi3 asyncua
  