name: htbox-forlinx CI

on:
  push:
    paths: 
      # - 'common/**'
      # - 'htbox-forlinx/version.json'
      # - 'htbox-forlinx/**'
      - '.github/workflows/htbox-forlinx.yml'
  workflow_dispatch:

jobs:

  job_toolchain:
    name: Toolchain
    runs-on: ubuntu-18.04
    steps:
      
      - name: Wget Toolchain
        run: wget https://launchpad.net/linaro-toolchain-binaries/trunk/2013.03/+download/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

      - name: Upload Artifact Toolchain
        uses: actions/upload-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

  job_base_rootfs:
    name: Base Root File System
    needs: [job_toolchain]
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Download Artifact Toolchain
        uses: actions/download-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./

      - name: Untar Toolchain
        run: tar jxf gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

      - name: Wget Buildroot
        run: |
          wget https://buildroot.org/downloads/buildroot-2019.02.11.tar.gz
          wget https://buildroot.org/downloads/buildroot-2017.02.11.tar.gz
          wget https://buildroot.org/downloads/buildroot-2016.02.tar.gz

      - name: Untar Buildroot
        run: |
          tar zxf buildroot-2019.02.11.tar.gz
          tar zxf buildroot-2017.02.11.tar.gz
          tar zxf buildroot-2016.02.tar.gz

      - name: Replace Buildroot Package Version
        run: |
          rm -rf buildroot-2019.02.11/package/openssh
          cp -rf buildroot-2016.02/package/openssh buildroot-2019.02.11/package/
          rm -rf buildroot-2019.02.11/package/openssl
          cp -rf buildroot-2016.02/package/openssl buildroot-2019.02.11/package/
          rm -rf buildroot-2019.02.11/package/zlib
          cp -rf buildroot-2016.02/package/zlib buildroot-2019.02.11/package/
          rm -rf buildroot-2019.02.11/package/mosquitto
          cp -rf buildroot-2016.02/package/mosquitto buildroot-2019.02.11/package/
          rm -rf buildroot-2019.02.11/package/iproute2
          cp -rf buildroot-2017.02.11/package/iproute2 buildroot-2019.02.11/package/
          rm -rf buildroot-2019.02.11/package/paho-mqtt-c
          cp -rf buildroot-2017.02.11/package/paho-mqtt-c buildroot-2019.02.11/package/

      - name: Patch Buildroot Package
        run: |
          patch -p1 < ../htbox-forlinx/buildroot-patch/ncurses.mk.patch
        working-directory: ./buildroot-2019.02.11

      - name: Config Buildroot Full
        run: cp -f htbox-forlinx/buildroot-config/config.2019.02.11 buildroot-2019.02.11/.config

      - name: Build Buildroot
        run: make -j$(nproc)
        working-directory: ./buildroot-2019.02.11

      - name: Config BusyBox
        run: |
          cp -f htbox-forlinx/buildroot-config/config.1.29.3 buildroot-2019.02.11/output/build/busybox-1.29.3/.config
          rm -f buildroot-2019.02.11/output/build/busybox-1.29.3/.stamp_configured
          rm -f buildroot-2019.02.11/output/build/busybox-1.29.3/.stamp_built
          rm -f buildroot-2019.02.11/output/build/busybox-1.29.3/.stamp_target_installed

      - name: Build Buildroot Again
        run: make -j$(nproc)
        working-directory: ./buildroot-2019.02.11

      - name: Upload Artifact Base Root File System
        uses: actions/upload-artifact@v2
        with:
          name: rootfs.tar
          path: ./buildroot-2019.02.11/output/images/rootfs.tar

  job_kernel:
    name: Kernel
    needs: [job_toolchain, job_base_rootfs]
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install APT Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y u-boot-tools

      - name: Download Artifact Toolchain
        uses: actions/download-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./

      - name: Untar Toolchain
        run: tar jxf gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

      - name: Git Kernel
        run: git clone -b 20200803 https://github.com/cookie-dragon/forlinx-335xS-II-kernel.git kernel

      - name: Patch Kernel
        run : patch -p1 < ../common/kernel-patch/timeconst.pl.x64.patch
        working-directory: ./kernel

      - name: Add Kernel File
        run: cp -rf htbox-forlinx/kernel-add/* kernel/

      - name: Build Kernel
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: |
          export PATH=$TOOLCHAIN:$PATH
          make distclean ARCH=arm CROSS_COMPILE=$CROSS_COMPILE
          make ok335xhtbox_evm_linux_defconfig ARCH=arm CROSS_COMPILE=$CROSS_COMPILE
          make -j$(nproc) ARCH=arm CROSS_COMPILE=$CROSS_COMPILE
          make ARCH=arm CROSS_COMPILE=$CROSS_COMPILE uImage
          make ARCH=arm CROSS_COMPILE=$CROSS_COMPILE modules
        working-directory: ./kernel

      - name: Upload Artifact Kernel
        uses: actions/upload-artifact@v2
        with:
          name: uImage
          path: ./kernel/arch/arm/boot/uImage

      - name: Download Artifact Base Root File System
        uses: actions/download-artifact@v2
        with:
          name: rootfs.tar
          path: ./

      - name: Untar Base Root File System
        run: |
          mkdir -p rootfs
          sudo tar xf rootfs.tar -C ./rootfs/
          
      - name: Kernel Modules Install
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: sudo make ARCH=arm CROSS_COMPILE=$CROSS_COMPILE modules_install INSTALL_MOD_PATH=../rootfs/
        working-directory: ./kernel

      - name: Tar Root File System
        run: sudo tar zcf rootfs.tar.gz rootfs/

      - name: Upload Artifact Root File System
        uses: actions/upload-artifact@v2
        with:
          name: rootfs.tar.gz
          path: ./rootfs.tar.gz

  job_wireless:
    name: Wireless
    needs: [job_toolchain]
    runs-on: ubuntu-18.04
    steps:

      - name: Download Artifact Toolchain
        uses: actions/download-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./

      - name: Untar Toolchain
        run: tar jxf gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

      - name: Git RTL8723D
        run: git clone -b v5.2.15.1_26226.20180129_COEX20171212-2222 https://github.com/cookie-dragon/realtek-rtl8723d.git 

      - name: Untar WirelessTools
        run: |
          tar zxf wireless_tools.30.rtl.tar.gz
        working-directory: ./realtek-rtl8723d/wireless_tools

      - name: Fix WirelessTools
        run: |
          sed -i '8c PREFIX = ./usr/local' Makefile
          sed -i '12c CC = arm-linux-gnueabihf-gcc' Makefile
          sed -i '14c AR = arm-linux-gnueabihf-ar' Makefile
          sed -i '15c RANLIB = arm-linux-gnueabihf-ranlib' Makefile
        working-directory: ./realtek-rtl8723d/wireless_tools/wireless_tools.30.rtl

      - name: Build WirelessTools
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: |
          export PATH=$TOOLCHAIN:$PATH
          make
          sudo make install
        working-directory: ./realtek-rtl8723d/wireless_tools/wireless_tools.30.rtl

      - name: Tar WirelessTools
        run: sudo tar zcf wireless_tools.tar.gz usr/
        working-directory: ./realtek-rtl8723d/wireless_tools/wireless_tools.30.rtl

      - name: Upload Artifact WirelessTools
        uses: actions/upload-artifact@v2
        with:
          name: wireless_tools.tar.gz
          path: ./realtek-rtl8723d/wireless_tools/wireless_tools.30.rtl/wireless_tools.tar.gz

      - name: Untar WpaSupplicant And Hostapd
        run: |
          tar zxf wpa_supplicant_hostapd-0.8_rtw_r24647.20171025.tar.gz
        working-directory: ./realtek-rtl8723d/wpa_supplicant_hostapd

      - name: Build Hostapd
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: |
          export PATH=$TOOLCHAIN:$PATH
          make CC=arm-linux-gnueabihf-gcc
          sudo make install
        working-directory: ./realtek-rtl8723d/wpa_supplicant_hostapd/wpa_supplicant_hostapd-0.8_rtw_r24647.20171025/hostapd

      - name: Tar Hostapd
        run: sudo tar zcf hostapd.tar.gz usr/local/bin/hostapd usr/local/bin/hostapd_cli
        working-directory: /

      - name: Upload Artifact Hostapd
        uses: actions/upload-artifact@v2
        with:
          name: hostapd.tar.gz
          path: /hostapd.tar.gz

      - name: Build WpaSupplicant
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: |
          export PATH=$TOOLCHAIN:$PATH
          make CC=arm-linux-gnueabihf-gcc
          sudo make install
        working-directory: ./realtek-rtl8723d/wpa_supplicant_hostapd/wpa_supplicant_hostapd-0.8_rtw_r24647.20171025/wpa_supplicant

      - name: Tar WpaSupplicant
        run: sudo tar zcf wpa_supplicant.tar.gz usr/local/sbin/wpa_cli usr/local/sbin/wpa_passphrase usr/local/sbin/wpa_supplicant
        working-directory: /

      - name: Upload Artifact WpaSupplicant
        uses: actions/upload-artifact@v2
        with:
          name: wpa_supplicant.tar.gz
          path: /wpa_supplicant.tar.gz

  job_snap7:
    name: Snap7
    needs: [job_toolchain]
    runs-on: ubuntu-18.04
    steps:

      - name: Download Artifact Toolchain
        uses: actions/download-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./

      - name: Untar Toolchain
        run: tar jxf gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

      - name: Wget Snap7
        run: wget https://netix.dl.sourceforge.net/project/snap7/Snap7-IoT/snap7-iot-arm/snap7-iot-arm-1.4.2.tar.gz

      - name: Untar Snap7
        run: tar zxvf snap7-iot-arm-1.4.2.tar.gz

      - name: Fix Snap7
        run: |
          sed -i '8c LinkerName := ${CROSS_COMPILE}g++' common.mk
          sed -i '9c SharedObjectLinkerName := ${CROSS_COMPILE}g++ -shared -fPIC' common.mk
          sed -i '30c AR := ${CROSS_COMPILE}ar rcus' common.mk
          sed -i '31c CXX := ${CROSS_COMPILE}g++' common.mk
          sed -i '32c CC := ${CROSS_COMPILE}gcc' common.mk
        working-directory: ./snap7-iot-arm-1.4.2/build/unix

      - name: Build Snap7
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: |
          export PATH=$TOOLCHAIN:$PATH
          make -f arm_v7_linux.mk
          sudo cp -f ../bin/arm_v7-linux/libsnap7.so /usr/lib
        working-directory: ./snap7-iot-arm-1.4.2/build/unix

      - name: Tar Snap7
        run: sudo tar zcf snap7.tar.gz usr/lib/libsnap7.so
        working-directory: /

      - name: Upload Artifact Snap7
        uses: actions/upload-artifact@v2
        with:
          name: snap7.tar.gz
          path: /snap7.tar.gz

  job_final_rootfs:
    name: Final Root File System
    needs: [job_kernel, job_wireless, job_snap7]
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install APT Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y mtd-utils

      - name: Download Artifact Root File System
        uses: actions/download-artifact@v2
        with:
          name: rootfs.tar.gz
          path: ./

      - name: Untar Root File System
        run: sudo tar zxf rootfs.tar.gz

      - name: Download Artifact WirelessTools
        uses: actions/download-artifact@v2
        with:
          name: wireless_tools.tar.gz
          path: ./

      - name: Untar WirelessTools
        run: sudo tar zxf wireless_tools.tar.gz -C ./rootfs/

      - name: Download Artifact Hostapd
        uses: actions/download-artifact@v2
        with:
          name: hostapd.tar.gz
          path: ./

      - name: Untar Hostapd
        run: sudo tar zxf hostapd.tar.gz -C ./rootfs/

      - name: Download Artifact WpaSupplicant
        uses: actions/download-artifact@v2
        with:
          name: wpa_supplicant.tar.gz
          path: ./

      - name: Untar WpaSupplicant
        run: sudo tar zxf wpa_supplicant.tar.gz -C ./rootfs/

      - name: Download Artifact Snap7
        uses: actions/download-artifact@v2
        with:
          name: snap7.tar.gz
          path: ./

      - name: Untar Snap7
        run: sudo tar zxf snap7.tar.gz -C ./rootfs/

      - name: Fix Root File System
        run: |
          sudo rm -rf rootfs/lib/modules/*/build
          sudo rm -rf rootfs/lib/modules/*/source

          sudo chown -R root:root htbox-forlinx/rootfs-add/*
          sudo find ./htbox-forlinx/rootfs-add -type d | xargs sudo chmod 777
          sudo find ./htbox-forlinx/rootfs-add -type f | xargs sudo chmod 640

          
          sudo chmod -R 750 htbox-forlinx/rootfs-add/etc/mdev/*
          sudo chmod -R 440 htbox-forlinx/rootfs-add/etc/sudoers.d/*
          sudo chmod -R 750 htbox-forlinx/rootfs-add/opt/bin/*
          
          sudo chmod -R 755 htbox-forlinx/rootfs-add/usr/local/bin/*

          sudo chmod -R 750 htbox-forlinx/rootfs-add/media/sample/rootfs/etc/init.d/*
          sudo chmod -R 750 htbox-forlinx/rootfs-add/media/sample/rootfs/opt/bin/*

          sudo cp -rf htbox-forlinx/rootfs-add/* rootfs/

      - name: Patch Root File System
        run: |
          sudo patch -p1 < ../htbox-forlinx/rootfs-patch/etc_bluetooth_main.conf.patch
          sudo patch -p1 < ../htbox-forlinx/rootfs-patch/etc_inittab.patch
          sudo patch -p1 < ../htbox-forlinx/rootfs-patch/etc_mdev.conf.patch
          sudo patch -p1 < ../htbox-forlinx/rootfs-patch/etc_profile.patch
        working-directory: ./rootfs

      - name: Tar Final Root File System
        run: sudo tar zcf rootfs-final.tar.gz rootfs/

      - name: Upload Artifact Final Root File System
        uses: actions/upload-artifact@v2
        with:
          name: rootfs-final.tar.gz
          path: ./rootfs-final.tar.gz

      - name: Build UBI File System
        run: |
          sudo mkfs.ubifs -F -r rootfs -m 2048 -e 126976 -c 1866 -o ubifs.img
          sudo ubinize -o ubi.img -m 2048 -p 128KiB -s 2048 -O 2048 htbox-forlinx/rootfs-config/ubinize-256M.cfg

      - name: Upload Artifact UBI File System
        uses: actions/upload-artifact@v2
        with:
          name: ubi.img
          path: ./ubi.img

