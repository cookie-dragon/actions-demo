  job_rootfs_part_base:
    name: Job - Rootfs Part - Base
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Sort Out
        run: |
          mkdir -p sort_out/rootfs
          cp -rf htbox-forlinx/rootfs-base-add/* sort_out/rootfs

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: rootfs_part_base
          path: ./sort_out/

  job_rootfs_part_advance:
    name: Job - Rootfs Part - Advance
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Sort Out
        run: |
          mkdir -p sort_out/rootfs
          cp -rf htbox-forlinx/rootfs-advance-add/* sort_out/rootfs

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: rootfs_part_advance
          path: ./sort_out/

  job_rootfs_part_custom:
    name: Job - Rootfs Part - Custom
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Sort Out
        run: |
          mkdir -p sort_out/rootfs
          cp -rf htbox-forlinx/rootfs-custom-add/* sort_out/rootfs

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: rootfs_part_custom
          path: ./sort_out/

  job_rootfs_part_busness:
