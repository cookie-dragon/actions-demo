name: cross compile CI

on:
  push:
    paths: 
      - '.github/workflows/cross-compile.yml'
  workflow_dispatch:

jobs:

  job_toolchain:
    name: Toolchain
    runs-on: ubuntu-18.04
    steps:
      
      - name: Wget Toolchain
        run: wget https://launchpad.net/linaro-toolchain-binaries/trunk/2013.03/+download/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

      - name: Upload Artifact Toolchain
        uses: actions/upload-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2

  job_stress:
    name: Job - Stress
    needs: [job_toolchain]
    runs-on: ubuntu-18.04
    steps:
    
      - name: Download Artifact Toolchain
        uses: actions/download-artifact@v2
        with:
          name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
          path: ./

      - name: Untar Toolchain
        run: tar jxf gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
        
      - name: Get
        run: |
          wget https://fossies.org/linux/privat/stress-1.0.4.tar.gz
          tar zxf stress-1.0.4.tar.gz
         
      - name: Build
        env:
          TOOLCHAIN: /home/runner/work/actions-demo/actions-demo/gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux/bin
          CROSS_COMPILE: arm-linux-gnueabihf-
        run: |
          export PATH=$TOOLCHAIN:$PATH
          ./configure CC=${CROSS_COMPILE}gcc --host=$CROSS_COMPILE
          make
        working-directory: ./stress-1.0.4

      - name: Upload Artifact Bin
        uses: actions/upload-artifact@v2
        with:
          name: stress
          path: ./stress-1.0.4/src/stress

  job_rt-tests:
    name: Job - rt-tests
#     needs: [job_toolchain]
    runs-on: ubuntu-18.04
    steps:
    
#       - name: Download Artifact Toolchain
#         uses: actions/download-artifact@v2
#         with:
#           name: gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
#           path: ./

#       - name: Untar Toolchain
#         run: tar jxf gcc-linaro-arm-linux-gnueabihf-4.7-2013.03-20130313_linux.tar.bz2
        
      - name: Get
        run: |
          git clone git://git.kernel.org/pub/scm/utils/rt-tests/rt-tests.git
          cd rt-tests
          git checkout stable/v1.0

      - name: Fix
        run: |
          sed -i '2c CC=$(CROSS_COMPILE)gcc' Makefile
          sed -i '3c AR=$(CROSS_COMPILE)ar' Makefile
          cat Makefile
        working-directory: ./rt-tests
        
